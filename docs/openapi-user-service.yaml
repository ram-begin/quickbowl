openapi: 3.0.3
info:
  title: QuickBowl User Service
  description: Handles user registration, authentication, and JWT issuance
  version: 1.0.0
servers:
  - url: http://localhost:3001/api
    description: Local development
  - url: http://localhost:3000/api/users
    description: Via API Gateway

paths:
  /auth/register:
    post:
      summary: Register a new customer
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/register/restaurant:
    post:
      summary: Register a restaurant owner
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRestaurantOwnerRequest'
      responses:
        '201':
          description: Restaurant owner registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      summary: Login and receive JWT token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/profile:
    get:
      summary: Get authenticated user profile
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify:
    get:
      summary: Verify JWT token (called by other services)
      tags: [Auth]
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: Bearer <token>
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/penalty/add:
    post:
      summary: Add a cancellation penalty to a user (called by Order Service)
      tags: [Internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, amount]
              properties:
                userId:
                  type: string
                amount:
                  type: number
      responses:
        '200':
          description: Penalty applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /auth/penalty/clear:
    post:
      summary: Clear penalty for a user (called by Payment Service)
      tags: [Internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        '200':
          description: Penalty cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [first_name, last_name, email, phone, password]
      properties:
        first_name:
          type: string
          example: Arjun
        last_name:
          type: string
          example: Sharma
        email:
          type: string
          format: email
          example: arjun@example.com
        phone:
          type: string
          example: "9876543210"
        password:
          type: string
          minLength: 8
          example: Secure@123

    RegisterRestaurantOwnerRequest:
      allOf:
        - $ref: '#/components/schemas/RegisterRequest'
        - type: object
          required: [restaurant_name]
          properties:
            restaurant_name:
              type: string
              example: Spice Garden

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [customer, restaurant_owner, admin]

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        data:
          $ref: '#/components/schemas/User'

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'