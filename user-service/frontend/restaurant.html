<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickBowl — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #dc2626; --red-dark: #991b1b;
      --gold: #FFD700; --gold-dark: #FFA500;
      --bg: #0f0505; --bg-card: #1a0808; --bg-cart: #120606;
      --border: #2a0a0a; --border-mid: #2a1010;
      --white: #ffffff; --text-muted: #aaaaaa; --text-dim: #666666;
      --font-display: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif;
      --radius-sm: 8px; --radius-md: 10px; --radius-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); min-height: 100vh; color: var(--white); }

    /* NAV */
    nav {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 28px; background: #0f0505;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      padding: 8px 14px; background: transparent;
      border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
      color: var(--text-muted); font-family: var(--font-body);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .back-btn:hover { color: var(--white); border-color: #444; }
    .logo-name { font-family: var(--font-display); font-size: 20px; font-weight: 800; }
    .logo-name .q { color: var(--gold); } .logo-name .b { color: var(--white); }

    /* LAYOUT */
    .layout { display: flex; gap: 0; min-height: calc(100vh - 57px); }

    /* MENU SIDE */
    .menu-side { flex: 1; padding: 28px; overflow-y: auto; }

    /* RESTAURANT HEADER */
    .rest-header {
      background: linear-gradient(135deg, #1a0505, #0f0505);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 24px; margin-bottom: 28px;
      display: flex; gap: 20px; align-items: center;
    }
    .rest-emoji { font-size: 52px; }
    .rest-info h1 { font-family: var(--font-display); font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .rest-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 13px; color: var(--text-muted); }
    .rest-meta span { display: flex; align-items: center; gap: 4px; }
    .rest-meta .gold { color: var(--gold); font-weight: 600; }
    .surge-banner {
      display: none; margin-bottom: 20px;
      background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.25);
      border-radius: var(--radius-md); padding: 12px 16px;
      font-size: 13px; color: #ff6b6b; font-weight: 600;
    }
    .surge-banner.show { display: flex; align-items: center; gap: 8px; }
    .discount-banner {
      display: none; margin-bottom: 20px;
      background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.2);
      border-radius: var(--radius-md); padding: 12px 16px;
      font-size: 13px; color: var(--gold); font-weight: 600;
    }
    .discount-banner.show { display: flex; align-items: center; gap: 8px; }

    /* MENU SECTION */
    .menu-section-title {
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
    }
    .menu-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 32px; }

    /* MENU ITEM */
    .menu-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .menu-item:hover { border-color: var(--border-mid); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .item-name { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--white); }
    .item-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .item-emoji { font-size: 32px; flex-shrink: 0; }
    .item-bottom { display: flex; align-items: center; justify-content: space-between; }
    .item-price { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--gold); }
    .add-btn {
      padding: 7px 16px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: white; border: none; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: box-shadow 0.2s;
    }
    .add-btn:hover { box-shadow: 0 4px 12px rgba(220,38,38,0.4); }
    .qty-control { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border-mid); background: var(--bg);
      color: var(--white); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
    .qty-num { font-family: var(--font-display); font-size: 14px; font-weight: 700; min-width: 16px; text-align: center; }

    /* CART SIDE */
    .cart-side {
      width: 340px; flex-shrink: 0;
      background: var(--bg-cart);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: sticky; top: 57px;
      height: calc(100vh - 57px);
      overflow-y: auto;
    }
    .cart-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .cart-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .cart-subtitle { font-size: 12px; color: var(--text-muted); }
    .cart-items { flex: 1; padding: 16px 20px; overflow-y: auto; }
    .cart-empty {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted); font-size: 13px;
    }
    .cart-empty-icon { font-size: 40px; margin-bottom: 10px; }

    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--white); }
    .cart-item-price { font-size: 13px; color: var(--gold); font-weight: 600; min-width: 52px; text-align: right; }
    .cart-qty-btn {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1px solid var(--border-mid); background: var(--bg);
      color: var(--white); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .cart-qty-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cart-qty { font-size: 13px; font-weight: 700; min-width: 16px; text-align: center; }

    /* CART SUMMARY */
    .cart-summary { padding: 16px 20px; border-top: 1px solid var(--border); }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--text-muted); margin-bottom: 8px;
    }
    .summary-row.total {
      color: var(--white); font-family: var(--font-display);
      font-size: 16px; font-weight: 700; margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .summary-row .gold { color: var(--gold); }

    /* DELIVERY */
    .delivery-section { padding: 0 20px 16px; }
    .delivery-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .delivery-input {
      width: 100%; padding: 10px 12px;
      background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm); color: var(--white);
      font-family: var(--font-body); font-size: 13px; outline: none;
      margin-bottom: 8px;
    }
    .delivery-input:focus { border-color: var(--gold); }
    .delivery-input::placeholder { color: var(--text-dim); }

    /* CHECKOUT BTN */
    .checkout-section { padding: 0 20px 20px; }
    .checkout-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a0505; border: none; border-radius: var(--radius-md);
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: box-shadow 0.2s;
    }
    .checkout-btn:hover { box-shadow: 0 6px 20px rgba(255,215,0,0.4); }
    .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: var(--radius-md); padding: 12px 20px;
      font-size: 13px; font-weight: 600; color: var(--white);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.3s ease; z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(255,215,0,0.4); color: var(--gold); }
    .toast.error { border-color: rgba(220,38,38,0.4); color: #ff6b6b; }

    /* LOADING */
    .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .cart-side { width: 100%; height: auto; position: static; border-left: none; border-top: 1px solid var(--border); }
      .menu-side { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <button class="back-btn" onclick="location.href='/dashboard.html'">← Back</button>
  <div class="logo-name"><span class="q">Quick</span><span class="b">Bowl</span></div>
</nav>

<div class="layout">
  <!-- MENU -->
  <div class="menu-side" id="menu-side">
    <div class="loading-state"><div class="spinner"></div>Loading menu...</div>
  </div>

  <!-- CART -->
  <div class="cart-side">
    <div class="cart-header">
      <div class="cart-title">🛒 Your Cart</div>
      <div class="cart-subtitle" id="cart-restaurant-name">Add items to get started</div>
    </div>

    <div class="cart-items" id="cart-items">
      <div class="cart-empty">
        <div class="cart-empty-icon">🍽️</div>
        Your cart is empty
      </div>
    </div>

    <div class="cart-summary" id="cart-summary" style="display:none">
      <div class="summary-row"><span>Subtotal</span><span id="s-subtotal">₹0</span></div>
      <div class="summary-row" id="surge-row" style="display:none"><span>🔥 Surge charge</span><span class="gold" id="s-surge">₹0</span></div>
      <div class="summary-row" id="discount-row" style="display:none"><span>🎉 Discount</span><span style="color:#4ade80" id="s-discount">-₹0</span></div>
      <div class="summary-row"><span>Delivery fee</span><span id="s-delivery">₹30</span></div>
      <div class="summary-row total"><span>Total</span><span class="gold" id="s-total">₹0</span></div>
    </div>

    <div class="delivery-section" id="delivery-section" style="display:none">
      <div class="delivery-label">Delivery Details</div>
      <input class="delivery-input" type="text" id="delivery-address" placeholder="Delivery address"/>
      <input class="delivery-input" type="tel" id="delivery-phone" placeholder="Phone number"/>
    </div>

    <div class="checkout-section" id="checkout-section" style="display:none">
      <button class="checkout-btn" onclick="placeOrder()" id="checkout-btn">
        Place Order →
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API   = 'http://localhost:3000/api';
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) location.href = '/';

  const params       = new URLSearchParams(location.search);
  const restaurantId = params.get('id');
  if (!restaurantId) location.href = '/dashboard.html';

  let restaurant = null;
  let cart       = {}; // { itemId: { item, qty } }

  const EMOJIS = ['🍛','🍕','🍜','🥘','🍱','🌮','🍔','🥗','🍣','🍲','🧆','🥙','🫕','🍗','🥩'];

  // ── Load restaurant + menu ─────────────────────────
  async function loadRestaurant() {
    try {
      const res  = await fetch(`${API}/restaurants/${restaurantId}`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      restaurant = data.data || data;
      renderMenu();
    } catch (e) {
      document.getElementById('menu-side').innerHTML = `
        <div class="loading-state">
          <div style="font-size:48px;margin-bottom:12px">⚠️</div>
          <p>Could not load restaurant</p>
        </div>`;
    }
  }

  function renderMenu() {
    const menu   = restaurant.menu || [];
    const isSurge     = restaurant.is_surge || restaurant.surge_multiplier > 1;
    const hasDiscount = restaurant.discount_active || restaurant.discount_percent > 0;
    const rating = restaurant.rating ? restaurant.rating.toFixed(1) : '4.5';

    document.getElementById('cart-restaurant-name').textContent = restaurant.name;
    document.title = `QuickBowl — ${restaurant.name}`;

    let html = `
      <div class="rest-header">
        <div class="rest-emoji">${EMOJIS[Math.floor(Math.random() * EMOJIS.length)]}</div>
        <div class="rest-info">
          <h1>${restaurant.name}</h1>
          <div class="rest-meta">
            <span class="gold">⭐ ${rating}</span>
            <span>🍽️ ${restaurant.cuisine_type || restaurant.cuisine || 'Multi-cuisine'}</span>
            <span>📍 ${restaurant.city || 'Local'}</span>
            <span>🕐 30–45 min</span>
          </div>
        </div>
      </div>
      <div class="surge-banner ${isSurge ? 'show' : ''}">
        🔥 Surge pricing active — ${restaurant.surge_multiplier || 1.5}x multiplier applied
      </div>
      <div class="discount-banner ${hasDiscount ? 'show' : ''}">
        🎉 ${restaurant.discount_percent || 10}% discount available on this order!
      </div>`;

    if (!menu.length) {
      html += `<div class="loading-state"><p style="color:var(--text-muted)">No menu items available</p></div>`;
    } else {
      // Group by category
      const categories = {};
      menu.forEach(item => {
        const cat = item.category || 'Menu';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(item);
      });

      Object.entries(categories).forEach(([cat, items]) => {
        html += `<div class="menu-section-title">${cat}</div><div class="menu-grid">`;
        items.forEach((item, i) => {
          const emoji = EMOJIS[i % EMOJIS.length];
          html += `
            <div class="menu-item" id="item-${item._id || item.id}">
              <div class="item-top">
                <div>
                  <div class="item-name">${item.name}</div>
                  <div class="item-desc">${item.description || ''}</div>
                </div>
                <div class="item-emoji">${emoji}</div>
              </div>
              <div class="item-bottom">
                <div class="item-price">₹${item.price}</div>
                <button class="add-btn" onclick="addToCart('${item._id || item.id}', '${item.name}', ${item.price})">
                  + Add
                </button>
              </div>
            </div>`;
        });
        html += `</div>`;
      });
    }

    document.getElementById('menu-side').innerHTML = html;
  }

  // ── Cart logic ─────────────────────────────────────
  function addToCart(id, name, price) {
    if (cart[id]) {
      cart[id].qty++;
    } else {
      cart[id] = { name, price, qty: 1 };
    }
    updateCart();
    showToast(`${name} added to cart`, 'success');
  }

  function changeQty(id, delta) {
    if (!cart[id]) return;
    cart[id].qty += delta;
    if (cart[id].qty <= 0) delete cart[id];
    updateCart();
  }

  function updateCart() {
    const items = Object.entries(cart);
    const cartEl     = document.getElementById('cart-items');
    const summaryEl  = document.getElementById('cart-summary');
    const deliveryEl = document.getElementById('delivery-section');
    const checkoutEl = document.getElementById('checkout-section');

    if (!items.length) {
      cartEl.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🍽️</div>Your cart is empty</div>`;
      summaryEl.style.display  = 'none';
      deliveryEl.style.display = 'none';
      checkoutEl.style.display = 'none';
      return;
    }

    // Render cart items
    cartEl.innerHTML = items.map(([id, item]) => `
      <div class="cart-item">
        <div class="cart-item-name">${item.name}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="cart-qty-btn" onclick="changeQty('${id}', -1)">−</button>
          <span class="cart-qty">${item.qty}</span>
          <button class="cart-qty-btn" onclick="changeQty('${id}', 1)">+</button>
        </div>
        <div class="cart-item-price">₹${(item.price * item.qty).toFixed(0)}</div>
      </div>`).join('');

    // Calculate totals
    const isSurge     = restaurant && (restaurant.is_surge || restaurant.surge_multiplier > 1);
    const hasDiscount = restaurant && (restaurant.discount_active || restaurant.discount_percent > 0);
    const surge       = restaurant?.surge_multiplier || 1;
    const discPct     = restaurant?.discount_percent || 10;

    const subtotal     = items.reduce((sum, [, i]) => sum + i.price * i.qty, 0);
    const surgeAmt     = isSurge ? Math.round(subtotal * (surge - 1)) : 0;
    const discAmt      = hasDiscount ? Math.round(subtotal * discPct / 100) : 0;
    const deliveryFee  = subtotal > 500 ? 0 : 30;
    const total        = subtotal + surgeAmt - discAmt + deliveryFee;

    document.getElementById('s-subtotal').textContent = `₹${subtotal}`;
    document.getElementById('s-delivery').textContent = deliveryFee === 0 ? 'FREE' : `₹${deliveryFee}`;
    document.getElementById('s-total').textContent    = `₹${total}`;

    const surgeRow    = document.getElementById('surge-row');
    const discountRow = document.getElementById('discount-row');
    if (isSurge) { surgeRow.style.display = 'flex'; document.getElementById('s-surge').textContent = `₹${surgeAmt}`; }
    else surgeRow.style.display = 'none';
    if (hasDiscount) { discountRow.style.display = 'flex'; document.getElementById('s-discount').textContent = `-₹${discAmt}`; }
    else discountRow.style.display = 'none';

    summaryEl.style.display  = 'block';
    deliveryEl.style.display = 'block';
    checkoutEl.style.display = 'block';
  }

  // ── Place Order ────────────────────────────────────
  async function placeOrder() {
    const address = document.getElementById('delivery-address').value.trim();
    const phone   = document.getElementById('delivery-phone').value.trim();

    if (!address) { showToast('Please enter delivery address', 'error'); return; }
    if (!phone)   { showToast('Please enter phone number', 'error'); return; }

    const btn = document.getElementById('checkout-btn');
    btn.textContent = 'Placing order...';
    btn.disabled    = true;

    const items = Object.entries(cart).map(([id, item]) => ({
      item_id:  id,
      name:     item.name,
      price:    item.price,
      quantity: item.qty,
    }));

    const subtotal    = items.reduce((sum, i) => sum + i.price * i.quantity, 0);
    const deliveryFee = subtotal > 500 ? 0 : 30;
    const isSurge     = restaurant?.is_surge || restaurant?.surge_multiplier > 1;
    const hasDiscount = restaurant?.discount_active || restaurant?.discount_percent > 0;
    const surge       = restaurant?.surge_multiplier || 1;
    const discPct     = restaurant?.discount_percent || 10;
    const surgeAmt    = isSurge ? Math.round(subtotal * (surge - 1)) : 0;
    const discAmt     = hasDiscount ? Math.round(subtotal * discPct / 100) : 0;
    const total       = subtotal + surgeAmt - discAmt + deliveryFee;

    try {
      const res = await fetch(`${API}/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({
          user_id:          user.id || user._id,
          restaurant_id:    restaurantId,
          restaurant_name:  restaurant.name,
          restaurant_city:  restaurant.city,
          items,
          delivery_address: address,
          delivery_phone:   phone,
          total_amount:     total,
          is_scheduled:     false,
          use_discount:     hasDiscount,
        }),
      });

      const data = await res.json();
      if (data.success || data.id || data.orderId) {
        showToast('🎉 Order placed successfully!', 'success');
        setTimeout(() => location.href = '/orders.html', 1500);
      } else {
        throw new Error(data.message || 'Order failed');
      }
    } catch (e) {
      showToast(e.message || 'Could not place order', 'error');
      btn.textContent = 'Place Order →';
      btn.disabled    = false;
    }
  }

  // ── Toast ──────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = `toast ${type}`, 2500);
  }

  loadRestaurant();
</script>
</body>
</html>
