<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickBowl — Restaurants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #dc2626; --red-dark: #991b1b;
      --gold: #FFD700; --gold-dark: #FFA500;
      --bg: #0f0505; --bg-card: #1a0808;
      --border: #2a0a0a; --border-mid: #2a1010;
      --white: #ffffff; --text-muted: #aaaaaa; --text-dim: #666666;
      --font-display: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif;
      --radius-sm: 8px; --radius-md: 10px; --radius-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); min-height: 100vh; color: var(--white); }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; background: #0f0505;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-name { font-family: var(--font-display); font-size: 20px; font-weight: 800; }
    .logo-name .q { color: var(--gold); } .logo-name .b { color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: var(--text-muted); }
    .nav-btn {
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-orders { background: transparent; color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
    .btn-orders:hover { background: rgba(255,215,0,0.08); }
    .btn-profile { background: transparent; color: var(--text-muted); border: 1px solid var(--border-mid); }
    .btn-profile:hover { color: var(--white); border-color: #444; }
    .btn-logout { background: rgba(220,38,38,0.12); color: var(--red); border: 1px solid rgba(220,38,38,0.25); }
    .btn-logout:hover { background: rgba(220,38,38,0.22); }

    /* HERO */
    .hero {
      padding: 44px 28px 36px;
      background: linear-gradient(135deg, #1a0505 0%, #0f0505 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 { font-family: var(--font-display); font-size: 30px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    .hero h1 span { color: var(--gold); }
    .hero p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .search-wrap { display: flex; gap: 10px; max-width: 520px; }
    .search-wrap input {
      flex: 1; padding: 13px 16px;
      background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: var(--radius-md); color: var(--white);
      font-family: var(--font-body); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.08); }
    .search-wrap input::placeholder { color: var(--text-dim); }
    .search-wrap button {
      padding: 13px 22px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a0505; border: none; border-radius: var(--radius-md);
      font-family: var(--font-display); font-size: 13px; font-weight: 700; cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .search-wrap button:hover { box-shadow: 0 4px 16px rgba(255,215,0,0.35); }

    /* MAIN */
    .main { padding: 32px 28px; max-width: 1140px; margin: 0 auto; }
    .section-title {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 18px; }

    /* RESTAURANT CARD */
    .rest-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .rest-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(220,38,38,0.12);
      border-color: #3a1515;
    }
    .rest-img {
      height: 150px;
      background: linear-gradient(135deg, #2d0808, #1a0505);
      display: flex; align-items: center; justify-content: center;
      font-size: 56px; position: relative;
    }
    .badge {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    }
    .badge-surge { background: rgba(220,38,38,0.92); color: white; }
    .badge-discount { background: rgba(255,215,0,0.92); color: #1a0505; }
    .rest-body { padding: 16px; }
    .rest-name {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--white); margin-bottom: 6px;
    }
    .rest-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag {
      padding: 3px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border-mid);
      font-size: 11px; color: var(--text-muted);
    }
    .rest-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .rest-stats { display: flex; gap: 14px; }
    .rest-stat { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .rest-stat.gold { color: var(--gold); font-weight: 600; }
    .order-now-btn {
      padding: 7px 16px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: white; border: none; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: box-shadow 0.2s;
    }
    .order-now-btn:hover { box-shadow: 0 4px 12px rgba(220,38,38,0.4); }

    /* STATES */
    .loading-state, .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 70px 20px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state h3 { font-family: var(--font-display); font-size: 16px; color: var(--white); margin-bottom: 6px; }

    @media (max-width: 600px) {
      nav { padding: 12px 16px; }
      .hero { padding: 28px 16px 24px; }
      .hero h1 { font-size: 22px; }
      .main { padding: 24px 16px; }
      .nav-user { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo-name"><span class="q">Quick</span><span class="b">Bowl</span></div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="nav-btn btn-orders" onclick="location.href='/orders.html'">My Orders</button>
    <button class="nav-btn btn-profile" onclick="location.href='/profile.html'">Profile</button>
    <button class="nav-btn btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="hero">
  <h1>What are you <span>craving</span> today?</h1>
  <p>Fresh food from the best restaurants, delivered fast</p>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search restaurants or cuisines..." oninput="filterRestaurants()"/>
    <button onclick="filterRestaurants()">Search</button>
  </div>
</div>

<div class="main">
  <div class="section-title">All Restaurants</div>
  <div class="grid" id="restaurant-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading restaurants...
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api';
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) location.href = '/';

  document.getElementById('nav-user').textContent = 'Hi, ' + (user.first_name || user.name || 'there') + ' 👋';

  let allRestaurants = [];

  function logout() { localStorage.clear(); location.href = '/'; }

  async function loadRestaurants() {
    try {
      const res  = await fetch(`${API}/restaurants`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      allRestaurants = data.all_restaurants?.data || data.data || data.restaurants || [];
      renderRestaurants(allRestaurants);
    } catch (e) {
      document.getElementById('restaurant-grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🍽️</div>
          <h3>Could not load restaurants</h3>
          <p>Make sure all services are running</p>
        </div>`;
    }
  }

  function filterRestaurants() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allRestaurants.filter(r =>
      (r.name||'').toLowerCase().includes(q) ||
      (r.cuisine_type||r.cuisine||'').toLowerCase().includes(q) ||
      (r.city||'').toLowerCase().includes(q)
    );
    renderRestaurants(filtered);
  }

  const EMOJIS = ['🍛','🍕','🍜','🥘','🍱','🌮','🍔','🥗','🍣','🍲','🧆','🥙'];

  function renderRestaurants(list) {
    const grid = document.getElementById('restaurant-grid');
    if (!list.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>No restaurants found</h3>
          <p>Try a different search term</p>
        </div>`;
      return;
    }
    grid.innerHTML = list.map((r, i) => {
      const emoji       = EMOJIS[i % EMOJIS.length];
      const isSurge     = r.is_surge || (r.surge_multiplier > 1);
      const hasDiscount = r.discount_active || r.discount_percent > 0;
      const rating      = r.rating ? r.rating.toFixed(1) : (4.0 + Math.random() * 0.9).toFixed(1);
      const delivery    = r.delivery_time || '30–45 min';
      const minOrder    = r.min_order || 99;
      const cuisine     = r.cuisine_type || r.cuisine || 'Multi-cuisine';
      const city        = r.city || 'Local';

      return `
        <div class="rest-card" onclick="goToRestaurant('${r._id || r.id}')">
          <div class="rest-img">
            ${emoji}
            ${isSurge     ? '<span class="badge badge-surge">🔥 Surge</span>' : ''}
            ${hasDiscount && !isSurge ? '<span class="badge badge-discount">% OFF</span>' : ''}
          </div>
          <div class="rest-body">
            <div class="rest-name">${r.name}</div>
            <div class="rest-tags">
              <span class="tag">${cuisine}</span>
              <span class="tag">📍 ${city}</span>
              ${r.is_veg ? '<span class="tag" style="color:#4ade80;border-color:#16a34a">🌿 Veg</span>' : ''}
            </div>
            <div class="rest-footer">
              <div class="rest-stats">
                <span class="rest-stat gold">⭐ ${rating}</span>
                <span class="rest-stat">🕐 ${delivery}</span>
                <span class="rest-stat">₹${minOrder} min</span>
              </div>
              <button class="order-now-btn" onclick="event.stopPropagation(); goToRestaurant('${r._id || r.id}')">
                Order →
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function goToRestaurant(id) { location.href = `/restaurant.html?id=${id}`; }

  loadRestaurants();
</script>
</body>
</html>
