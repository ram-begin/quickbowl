<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 72'><defs><linearGradient id='lb' x1='0' y1='0' x2='0' y2='1'><stop offset='0%25' stop-color='%23dc2626'/><stop offset='100%25' stop-color='%237f1d1d'/></linearGradient><linearGradient id='lg' x1='0' y1='0' x2='0' y2='1'><stop offset='0%25' stop-color='%23FFD700'/><stop offset='100%25' stop-color='%23FFA500'/></linearGradient></defs><path d='M13 38 Q13 58 36 58 Q59 58 59 38 Z' fill='url(%23lb)'/><rect x='11' y='33' width='50' height='8' rx='4' fill='url(%23lg)'/><line x1='24' y1='31' x2='16' y2='8' stroke='white' stroke-width='3' stroke-linecap='round'/><line x1='32' y1='31' x2='26' y2='8' stroke='white' stroke-width='3' stroke-linecap='round'/><line x1='40' y1='31' x2='46' y2='8' stroke='%23FFD700' stroke-width='3' stroke-linecap='round'/><line x1='48' y1='31' x2='56' y2='8' stroke='%23FFD700' stroke-width='3' stroke-linecap='round'/></svg>"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickBowl — Restaurants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #dc2626; --red-dark: #991b1b;
      --gold: #FFD700; --gold-dark: #FFA500;
      --bg: #0f0505; --bg-card: #1a0808;
      --border: #2a0a0a; --border-mid: #2a1010;
      --white: #ffffff; --text-muted: #aaaaaa; --text-dim: #666666;
      --font-display: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif;
      --radius-sm: 8px; --radius-md: 10px; --radius-lg: 16px;
      --sidebar-w: 220px;
      --nav-h: 57px;
      --bottom-nav-h: 64px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); min-height: 100vh; color: var(--white); }

    /* ── TOP NAV ── */
    nav {
      height: var(--nav-h);
      padding: 0;
      background: #0f0505;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
    }
    .nav-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.06); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-name { font-family: var(--font-display); font-size: 20px; font-weight: 800; }
    .logo-name .q { color: var(--gold); } .logo-name .b { color: var(--white); }
    .nav-user { font-size: 13px; color: var(--text-muted); }
    .nav-logout {
      padding: 7px 14px; border-radius: var(--radius-sm);
      background: rgba(220,38,38,0.12); color: var(--red);
      border: 1px solid rgba(220,38,38,0.25);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-logout:hover { background: rgba(220,38,38,0.22); }
    .nav-right-desktop { display: flex; align-items: center; gap: 12px; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── DESKTOP SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
    }
    .sidebar-section {
      padding: 0 12px; margin-bottom: 8px;
      font-size: 10px; font-weight: 700;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; font-size: 13px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      border-left: 3px solid transparent; text-decoration: none;
      margin-bottom: 2px;
    }
    .sidebar-item:hover { color: var(--white); background: rgba(255,255,255,0.03); }
    .sidebar-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(255,215,0,0.05); }
    .sidebar-icon { font-size: 17px; width: 20px; text-align: center; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 12px 20px; }
    .sidebar-logout {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; font-size: 13px; font-weight: 600;
      color: var(--red); cursor: pointer; transition: all 0.2s;
      border-left: 3px solid transparent; border: none; background: none;
      width: 100%; text-align: left; margin-top: 8px;
    }
    .sidebar-logout:hover { background: rgba(220,38,38,0.06); }

    /* ── MAIN CONTENT ── */
    .main-content { flex: 1; overflow-y: auto; }

    /* ── HERO ── */
    .hero {
      padding: 40px 0 32px;
      background: linear-gradient(135deg, #1a0505 0%, #0f0505 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero-inner { max-width: 1140px; margin: 0 auto; padding: 0 28px; }
    .hero h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
    .hero h1 span { color: var(--gold); }
    .hero p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
    .search-wrap { display: flex; gap: 10px; max-width: 520px; }
    .search-wrap input {
      flex: 1; padding: 12px 16px;
      background: var(--bg-card); border: 1px solid var(--border-mid);
      border-radius: var(--radius-md); color: var(--white);
      font-family: var(--font-body); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.08); }
    .search-wrap input::placeholder { color: var(--text-dim); }
    .search-wrap button {
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a0505; border: none; border-radius: var(--radius-md);
      font-family: var(--font-display); font-size: 13px; font-weight: 700; cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .search-wrap button:hover { box-shadow: 0 4px 16px rgba(255,215,0,0.35); }
    .filter-chip {
  padding: 6px 14px; border-radius: 20px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border-mid);
  color: var(--text-muted); font-family: var(--font-body); font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--gold); color: var(--gold); }
.filter-chip.active { background: rgba(255,215,0,0.1); border-color: var(--gold); color: var(--gold); }

    /* ── PAGE CONTENT ── */
    .page-content { padding: 28px; max-width: 1140px; margin: 0 auto; }
    .section-title {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── RESTAURANT GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    .rest-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .rest-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(220,38,38,0.12); border-color: #3a1515; }
    .rest-img {
      height: 148px;
      background: linear-gradient(135deg, #2d0808, #1a0505);
      display: flex; align-items: center; justify-content: center;
      font-size: 54px; position: relative;
    }
    .badge { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
    .badge-discount { background: rgba(255,215,0,0.92); color: #1a0505; }
    .rest-body { padding: 14px; }
    .rest-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .rest-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .tag { padding: 3px 8px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-mid); font-size: 11px; color: var(--text-muted); }
    .rest-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border); }
    .rest-stats { display: flex; gap: 12px; }
    .rest-stat { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 3px; }
    .rest-stat.gold { color: var(--gold); font-weight: 600; }
    .order-now-btn {
      padding: 6px 14px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: white; border: none; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: box-shadow 0.2s;
    }
    .order-now-btn:hover { box-shadow: 0 4px 12px rgba(220,38,38,0.4); }

    /* ── STATES ── */
    .loading-state, .empty-state { grid-column: 1 / -1; text-align: center; padding: 70px 20px; color: var(--text-muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state h3 { font-family: var(--font-display); font-size: 16px; color: var(--white); margin-bottom: 6px; }

    /* ── OFFERS PAGE ── */
    .offers-page { padding: 28px; max-width: 900px; margin: 0 auto; }
    .offer-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 20px;
      transition: border-color 0.2s;
    }
    .offer-card:hover { border-color: var(--border-mid); }
    .offer-icon { font-size: 40px; flex-shrink: 0; }
    .offer-info { flex: 1; }
    .offer-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .offer-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .offer-tag {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .offer-tag.platform { background: rgba(255,215,0,0.12); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
    .offer-tag.restaurant { background: rgba(220,38,38,0.1); color: #ff6b6b; border: 1px solid rgba(220,38,38,0.2); }
    .offer-badge {
      font-family: var(--font-display); font-size: 22px; font-weight: 800;
      color: var(--gold); flex-shrink: 0; text-align: right; min-width: 70px;
    }
    .offer-valid { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ── BOTTOM NAV (mobile only) ── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bottom-nav-h);
      background: #0f0505;
      border-top: 1px solid var(--border);
      z-index: 200;
    }
    .bottom-nav-inner {
      display: flex; height: 100%;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      cursor: pointer; transition: all 0.2s;
      border: none; background: none; color: var(--text-dim);
      font-family: var(--font-body);
    }
    .bottom-nav-item.active { color: var(--gold); }
    .bottom-nav-item:hover { color: var(--text-muted); }
    .bottom-nav-icon { font-size: 20px; line-height: 1; }
    .bottom-nav-label { font-size: 10px; font-weight: 600; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .nav-right-desktop { display: none; }
      .bottom-nav { display: block; }
      .main-content { padding-bottom: var(--bottom-nav-h); }
      .hero { padding: 28px 0 24px; }
      .hero h1 { font-size: 22px; }
      .hero-inner { padding: 0 16px; }
      .page-content { padding: 20px 16px; }
      .offers-page { padding: 20px 16px; }
      .grid { grid-template-columns: 1fr; }
      .offer-card { flex-wrap: wrap; gap: 12px; }
    }
  </style>
</head>
<body>

<!-- TOP NAV -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 72 72" fill="none">
          <defs>
            <linearGradient id="lb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#7f1d1d"/></linearGradient>
            <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#FFA500"/></linearGradient>
          </defs>
          <path d="M13 38 Q13 58 36 58 Q59 58 59 38 Z" fill="url(#lb)"/>
          <rect x="11" y="33" width="50" height="8" rx="4" fill="url(#lg)"/>
          <line x1="24" y1="31" x2="16" y2="8" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <line x1="32" y1="31" x2="26" y2="8" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <line x1="40" y1="31" x2="46" y2="8" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
          <line x1="48" y1="31" x2="56" y2="8" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-name"><span class="q">Quick</span><span class="b">Bowl</span></div>
    </div>
    <div class="nav-right-desktop">
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-logout" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="layout">

  <!-- DESKTOP SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">Menu</div>
    <div class="sidebar-item active" id="sb-home" onclick="showTab('home')">
      <span class="sidebar-icon">🍽️</span> Restaurants
    </div>
    <div class="sidebar-item" id="sb-orders" onclick="showTab('orders')">
      <span class="sidebar-icon">📦</span> My Orders
    </div>
    
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Account</div>
    <div class="sidebar-item" id="sb-profile" onclick="location.href='/profile.html'">
      <span class="sidebar-icon">👤</span> Profile
    </div>
    <button class="sidebar-logout" onclick="logout()">
      <span class="sidebar-icon">🚪</span> Logout
    </button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- HOME TAB -->
    <div id="tab-home">
      <div class="hero">
        <div class="hero-inner">
          <h1>Discover <span>Restaurants</span> near you</h1>
          <p>Fresh food from the best restaurants, delivered fast</p>
          <div class="search-wrap">
  <input type="text" id="search-input" placeholder="Search restaurants or cuisines..." oninput="filterRestaurants()"/>
  <button onclick="filterRestaurants()">Search</button>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px" id="filter-chips">
  <span style="font-size:12px;color:var(--text-dim);align-self:center">Filter:</span>
  <button class="filter-chip active" onclick="setFilter('cuisine','')" id="chip-all">All</button>
  <button class="filter-chip" onclick="setFilter('cuisine','North Indian')">🍛 North Indian</button>
  <button class="filter-chip" onclick="setFilter('cuisine','South Indian')">🥘 South Indian</button>
  <button class="filter-chip" onclick="setFilter('cuisine','Chinese')">🍜 Chinese</button>
  <button class="filter-chip" onclick="setFilter('cuisine','Fast Food')">🍔 Fast Food</button>
  <button class="filter-chip" onclick="setFilter('cuisine','Pizza')">🍕 Pizza</button>
  <button class="filter-chip" onclick="setFilter('cuisine','Biryani')">🍱 Biryani</button>
</div>
        </div>
      </div>
      <div class="page-content">
        <div class="section-title">All Restaurants</div>
        <div class="grid" id="restaurant-grid">
          <div class="loading-state"><div class="spinner"></div>Loading restaurants...</div>
        </div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders" style="display:none">
      <div class="page-content">
        <div class="section-title" style="font-size:20px;text-transform:none;letter-spacing:0;color:var(--white);font-family:var(--font-display);font-weight:800;margin-bottom:6px">My Orders</div>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px">Track your current and past orders</p>
        <div id="orders-list"><div class="loading-state"><div class="spinner"></div>Loading orders...</div></div>
      </div>
    </div>

    

  </div>
</div>

<!-- BOTTOM NAV (mobile) -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bottom-nav-item active" id="bn-home" onclick="showTab('home')">
      <span class="bottom-nav-icon">🍽️</span>
      <span class="bottom-nav-label">Restaurants</span>
    </button>
    <button class="bottom-nav-item" id="bn-orders" onclick="showTab('orders')">
      <span class="bottom-nav-icon">📦</span>
      <span class="bottom-nav-label">Orders</span>
    </button>
    
    <button class="bottom-nav-item" id="bn-profile" onclick="location.href='/profile.html'">
      <span class="bottom-nav-icon">👤</span>
      <span class="bottom-nav-label">Profile</span>
    </button>
  </div>
</div>

<script>
  const API   = 'http://localhost:3000/api';
  const ORDER_API = 'http://localhost:8002/api';
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) location.href = '/';

  document.getElementById('nav-user').textContent = 'Hi, ' + (user.first_name || user.name || 'there') + ' 👋';
let allRestaurants = [];
let currentTab = 'home';
let activeFilters = { cuisine: '' };

  function logout() {
  localStorage.removeItem('qb_cart');
  localStorage.removeItem('qb_cart_restaurant');
  localStorage.clear();
  location.href = '/';
}

  // ── Tab switching ───────────────────────────────────
  function showTab(name, pushState = true) {
    sessionStorage.setItem('currentTab', name);
    if (pushState) history.pushState({ tab: name }, '', '');
    // Stop orders auto-refresh when leaving orders tab
if (currentTab === 'orders' && name !== 'orders') {
  if (window.ordersRefreshTimer) clearInterval(window.ordersRefreshTimer);
}
    // Hide all tabs
    ['home','orders'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = 'none';
    });
    // Deactivate sidebar items
    ['home','orders'].forEach(t => {
      const sb = document.getElementById(`sb-${t}`);
      if (sb) sb.classList.remove('active');
      const bn = document.getElementById(`bn-${t}`);
      if (bn) bn.classList.remove('active');
    });
    // Show active tab
    document.getElementById(`tab-${name}`).style.display = 'block';
    const sb = document.getElementById(`sb-${name}`);
    if (sb) sb.classList.add('active');
    const bn = document.getElementById(`bn-${name}`);
    if (bn) bn.classList.add('active');
    currentTab = name;
    // Load content
    if (name === 'orders') {
  loadOrders();
  // Auto-refresh orders every 15 seconds
  if (window.ordersRefreshTimer) clearInterval(window.ordersRefreshTimer);
  window.ordersRefreshTimer = setInterval(loadOrders, 15000);
}
    
    // Scroll to top
    window.scrollTo(0, 0);
  }

  // ── HOME: Load Restaurants ──────────────────────────
  async function loadRestaurants() {
    try {
      const res  = await fetch(`${API}/restaurants`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
allRestaurants = [...(data.all_restaurants?.data || []), ...(data.customer_favourites?.data || [])];
      renderRestaurants(allRestaurants);
    } catch (e) {
      document.getElementById('restaurant-grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🍽️</div>
          <h3>Could not load restaurants</h3>
          <p>Make sure all services are running</p>
        </div>`;

    }
  }

 function filterRestaurants() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderRestaurants(allRestaurants.filter(r => {
    const matchSearch = !q ||
      (r.name||'').toLowerCase().includes(q) ||
      (r.cuisine_type||r.cuisine||'').toLowerCase().includes(q) ||
      (r.city||'').toLowerCase().includes(q);
    const matchCuisine = !activeFilters.cuisine ||
      (r.cuisine_type||r.cuisine||'').toLowerCase().includes(activeFilters.cuisine.toLowerCase());
    return matchSearch && matchCuisine;
  }));
}

function setFilter(type, value) {
  activeFilters[type] = value;
  // Update chip styles
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (!value) {
    document.getElementById('chip-all').classList.add('active');
  } else {
    event.target.classList.add('active');
  }
  filterRestaurants();
}
 function getDiscountBadges(r) {
    const badges = [];
    if (globalDiscount?.active && globalDiscount?.percent)
      badges.push(`<span style="background:rgba(220,38,38,0.12);color:#ff6b6b;border:1px solid rgba(220,38,38,0.25);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-right:4px">${globalDiscount.percent}% OFF</span>`);
    if (r.admin_discount_active && r.admin_discount_percent)
      badges.push(`<span style="background:rgba(220,38,38,0.12);color:#ff6b6b;border:1px solid rgba(220,38,38,0.25);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-right:4px">${r.admin_discount_percent}% OFF</span>`);
    if (r.owner_discount_active && r.owner_discount_percent)
      badges.push(`<span style="background:rgba(220,38,38,0.12);color:#ff6b6b;border:1px solid rgba(220,38,38,0.25);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-right:4px">${r.owner_discount_percent}% OFF</span>`);
    return badges.join('');
  }


  const EMOJIS = ['🍛','🍕','🍜','🥘','🍱','🌮','🍔','🥗','🍣','🍲','🧆','🥙']; 



  function renderRestaurants(list) {
    const grid = document.getElementById('restaurant-grid');
    if (!list.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>No restaurants found</h3><p>Try a different search term</p></div>`;
      return;
    }
    grid.innerHTML = list.map((r, i) => {
      const emoji      = EMOJIS[i % EMOJIS.length];
      const discountBadges = getDiscountBadges(r);
      const hasDiscount = discountBadges.length > 0;
      const rating = r.rating ? r.rating.toFixed(1) : (4.0 + (parseInt((r._id||r.id||'0').slice(-2), 16) % 10) / 10).toFixed(1);
      const delivery   = r.delivery_time || '30–45 min';
      const minOrder   = r.min_order || 99;
      const cuisine    = r.cuisine_type || r.cuisine || 'Multi-cuisine';
      const city       = r.city || 'Local';
      return `
        <div class="rest-card" onclick="goToRestaurant('${r._id || r.id}')">
          <div class="rest-img">
            ${emoji}
            ${hasDiscount ? `<div style="position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;align-items:flex-end">${discountBadges}</div>` : ''}
          </div>
          <div class="rest-body">
            <div class="rest-name">${r.name}</div>
            <div class="rest-tags">
              <span class="tag">${cuisine}</span>
              <span class="tag">📍 ${city}</span>
              ${r.is_veg ? '<span class="tag" style="color:#4ade80;border-color:#16a34a">🌿 Veg</span>' : ''}
            </div>
            <div class="rest-footer">
              <div class="rest-stats">
                <span class="rest-stat gold">⭐ ${rating}</span>
                <span class="rest-stat">🕐 ${delivery}</span>
                <span class="rest-stat">₹${minOrder} min</span>
              </div>
              <button class="order-now-btn" onclick="event.stopPropagation(); goToRestaurant('${r._id || r.id}')">Order →</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function goToRestaurant(id) { location.href = `/restaurant.html?id=${id}`; }

  // ── ORDERS ──────────────────────────────────────────
  const STATUS_LABELS = {
    PENDING:'⏳ Pending', CONFIRMED:'✅ Confirmed', PREPARING:'👨‍🍳 Preparing',
    OUT_FOR_DELIVERY:'🛵 On the way', DELIVERED:'🎉 Delivered',
    CANCELLED:'❌ Cancelled', SCHEDULED:'📅 Scheduled',
  };
  const STATUS_STEPS = ['PENDING','CONFIRMED','PREPARING','OUT_FOR_DELIVERY','DELIVERED'];

  async function loadOrders() {
    const el = document.getElementById('orders-list');
    el.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading orders...</div>';
    try {
      const userId = user.id || user._id;
      const res    = await fetch(`${ORDER_API}/orders/user/${userId}`, { headers: { Authorization: `Bearer ${token}` } });
      const data   = await res.json();
      const orders = data.data || data.orders || data || [];
      renderOrders(Array.isArray(orders) ? orders : []);
    } catch (e) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Could not load orders</h3></div>`;
    }
  }

  function renderOrders(orders) {
    const el = document.getElementById('orders-list');
    if (!orders.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🍽️</div>
          <h3>No orders yet</h3>
          <p>Place your first order and it will appear here</p>
          <button onclick="showTab('home')" style="margin-top:16px;padding:12px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#1a0505;border:none;border-radius:var(--radius-md);font-family:var(--font-display);font-size:13px;font-weight:700;cursor:pointer">Browse Restaurants</button>
        </div>`;
      return;
    }
    el.innerHTML = orders.map(order => {
      const status      = order.status || 'PENDING';
      const isCancelled = status === 'CANCELLED';
      const stepIndex   = STATUS_STEPS.indexOf(status);
      const items       = parseItems(order.items);
      const rawDate = (order.created_at || order.createdAt || '').replace(' ', 'T').replace(/(\.\d+)?$/, 'Z');
      const date = new Date(rawDate).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', timeZone:'Asia/Kolkata' });
      const statusColors = { PENDING:'#FFA500', CONFIRMED:'#60a5fa', PREPARING:'#c084fc', OUT_FOR_DELIVERY:'#FFD700', DELIVERED:'#4ade80', CANCELLED:'#ff6b6b', SCHEDULED:'#a5b4fc' };
      const color = statusColors[status] || '#aaa';

      let progressHtml = '';
      if (!isCancelled) {
        const stepLabels = ['Placed','Confirmed','Preparing','On way','Delivered'];
        progressHtml = `<div style="display:flex;align-items:center;margin-bottom:14px">`;
        STATUS_STEPS.forEach((step, i) => {
          const isDone = i < stepIndex, isActive = i === stepIndex;
          const dotColor = isDone ? '#4ade80' : isActive ? 'var(--gold)' : 'var(--border-mid)';
          if (i > 0) progressHtml += `<div style="flex:1;height:2px;background:${isDone ? '#4ade80' : 'var(--border-mid)'};margin-bottom:14px"></div>`;
          progressHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="width:10px;height:10px;border-radius:50%;background:${dotColor};${isActive ? 'box-shadow:0 0 8px rgba(255,215,0,0.5)' : ''}"></div>
            <span style="font-size:9px;color:${isActive ? 'var(--gold)' : isDone ? '#4ade80' : 'var(--text-dim)'};white-space:nowrap">${stepLabels[i]}</span>
          </div>`;
        });
        progressHtml += `</div>`;
      }

      const canCancel = ['PENDING','CONFIRMED'].includes(status);
      return `
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px">
            <div>
              <div style="font-family:var(--font-display);font-size:14px;font-weight:700">Order #${order.id || order._id} <span style="color:var(--text-muted);font-weight:400;font-size:12px">· ${date}</span></div>
            </div>
            <span style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;background:${color}22;color:${color};border:1px solid ${color}44">${STATUS_LABELS[status] || status}</span>
          </div>
          <div style="padding:14px 18px">
            <div style="font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:12px">🍽️ ${order.restaurant_name || order.restaurantName || 'Restaurant'}</div>
            ${progressHtml}
            <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px">
              ${items.map(item => `
                <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted)">
                  <span><span style="color:var(--text-dim)">×${item.quantity || item.qty || 1}</span> ${item.name}</span>
                  <span style="color:var(--white);font-weight:600">₹${(item.price * (item.quantity || item.qty || 1)).toFixed(0)}</span>
                </div>`).join('')}
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px">
              <div>
                <div style="font-family:var(--font-display);font-size:15px;font-weight:700">Total: <span style="color:var(--gold)">₹${order.total_amount || order.totalAmount || 0}</span></div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:2px">📍 ${order.delivery_address || order.deliveryAddress || ''}</div>
              </div>
              ${canCancel ? `<button onclick="cancelOrder('${order.id || order._id}')" style="padding:7px 14px;background:transparent;border:1px solid rgba(220,38,38,0.3);border-radius:var(--radius-sm);color:var(--red);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer">Cancel</button>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function parseItems(items) {
    if (!items) return [];
    if (Array.isArray(items)) return items;
    try { return JSON.parse(items); } catch { return []; }
  }

  async function cancelOrder(orderId) {
    if (!confirm('Cancel this order?')) return;
    try {
const res  = await fetch(`${ORDER_API}/orders/${orderId}/status`, {
            method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status: 'CANCELLED', reason: 'Cancelled by customer' }),
      });
      const data = await res.json();
      if (data.success || data.id) { loadOrders(); }
    } catch (e) {}
  }

 // Init
  let globalDiscount = null;
  async function initDashboard() {
    try {
      const res  = await fetch(`${API}/restaurants/settings/platform-discount`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      globalDiscount = data.data?.active ? data.data : null;
    } catch(e) { globalDiscount = null; }
    loadRestaurants();
  }

  // Restore last tab on refresh
  const lastTab = sessionStorage.getItem('currentTab') || 'home';
  initDashboard().then(() => {
    if (lastTab !== 'home') showTab(lastTab);
  });

// Handle browser back button
  window.addEventListener('popstate', function(e) {
    const tab = e.state?.tab || 'home';
    showTab(tab, false);
  });

</script>
</body>
</html>
