services:

  # Databases
  postgres-user:
    image: postgres:15-alpine
    container_name: qb-postgres-user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - quickbowl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:15-alpine
    container_name: qb-postgres-order
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    networks:
      - quickbowl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    container_name: qb-postgres-payment
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - quickbowl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: qb-mongodb
    environment:
      MONGO_INITDB_DATABASE: restaurantdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - quickbowl-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quickbowl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Broker
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: qb-zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      - quickbowl-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: wurstmeister/kafka:latest
    container_name: qb-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - quickbowl-network
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
  # Services
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: qb-user-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres-user
      DB_PORT: 5432
      DB_NAME: userdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your_jwt_secret_key
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - quickbowl-network
    restart: unless-stopped

  restaurant-service:
    build:
      context: ./restaurant-service
      dockerfile: Dockerfile
    container_name: qb-restaurant-service
    ports:
      - "8001:8001"
    environment:
      MONGODB_URL: mongodb://mongodb:27017/restaurantdb
      JWT_SECRET: your_jwt_secret_key
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - quickbowl-network
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: qb-order-service
    ports:
      - "8002:8002"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/orderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8002
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - quickbowl-network
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: qb-payment-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_NAME: paymentdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your_jwt_secret_key
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - quickbowl-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: qb-notification-service
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your_jwt_secret_key
      KAFKA_BROKER: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - quickbowl-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: qb-api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      RESTAURANT_SERVICE_URL: http://restaurant-service:8001
      ORDER_SERVICE_URL: http://order-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      JWT_SECRET: your_jwt_secret_key
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - payment-service
      - notification-service
    networks:
      - quickbowl-network
    restart: unless-stopped

volumes:
  postgres_user_data:
  postgres_order_data:
  postgres_payment_data:
  mongo_data:
  redis_data:

networks:
  quickbowl-network:
    driver: bridge